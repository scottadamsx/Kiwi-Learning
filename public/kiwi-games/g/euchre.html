<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
  /* Paper & clay — a warm, branded surface (independent of editor theme, to match
     the Kiwi engage mockups). Sage green + gold play supporting roles. */
  :root{
    --bg:#FBFAF4; --card:#FFFFFF; --line:#E2DCCC; --fg:#2E2B25; --muted:#8C8676;
    --clay:#D97757; --clay-d:#C26343; --tint:#F6E9E2; --chip:#F3EFE7;
    --green:#6F9A4E; --green2:#557F38; --gold:#D9A65C; --gtext:#ffffff;
    /* Game tile fills (Memory, Minesweeper, 2048, Whack…) — must be visible vs. the bg. */
    --tile:#E7E0CE; --hover:#EFE9DA;
    --display:'Newsreader',Georgia,'Times New Roman',serif;
    --sans:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  /* Fit-to-window: center the activity, never scroll the page itself. */
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--fg);line-height:1.5;
       overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:14px 16px;
       touch-action:manipulation;-webkit-text-size-adjust:100%}
  /* Mobile fit for EVERY game: tall layouts scroll instead of clipping, align to the top, and pad
     past the rounded-screen safe area so keyboards/buttons are never cut off at the edges or bottom
     (the Word Break treatment, made global). Games may still refine this in their own media query. */
  @media (max-width:640px){
    html,body{height:auto;min-height:100%}
    /* Top padding clears the fixed top bar (← All games / Shuffle chip / How to play) so it never
       overlaps the game's "Quick Play" header — content starts below those buttons. */
    body{overflow-y:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;
         padding:58px 18px calc(26px + env(safe-area-inset-bottom,0px))}
  }
  /* Bottom-docked button bar (mobile): the runtime button-mover relocates a game's control row here,
     below the board, so every game's buttons sit at the bottom on a phone. */
  .kiwi-btnbar{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;margin-top:16px}
  .kiwi-btnbar>div{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;width:100%;margin-top:0}
  .wrap{width:100%;max-width:1080px;margin:0 auto;display:flex;flex-direction:column;min-height:0}
  .k-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--clay-d)}
  .k-title,h1{font-family:var(--display);font-weight:500;font-size:30px;line-height:1.12;margin:6px 0 0;color:var(--fg)}
  .k-sub,.sub{color:var(--muted);font-size:13.5px;margin-top:6px}
  .reward{color:var(--clay-d);font-weight:600}
  .sim{display:none}
  /* Segmented progress (done = green, current = clay, rest = line). */
  .k-prog{display:flex;gap:6px;margin-bottom:18px}
  .k-prog>i{flex:1;height:4px;border-radius:999px;background:var(--line)}
  .k-prog>i.done{background:var(--green)} .k-prog>i.cur{background:var(--clay)}
  /* Option cards */
  .k-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
  @media (max-width:520px){ .k-grid{grid-template-columns:1fr} }
  .k-opt{display:flex;align-items:center;gap:16px;width:100%;text-align:left;cursor:pointer;
         background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:16px 18px;
         font-family:var(--display);font-size:21px;color:var(--fg);transition:border-color .12s,background .12s}
  .k-opt:hover{border-color:#dcd5c6}
  .k-opt.sel{border-color:var(--clay);background:var(--tint)}
  .k-opt-ic{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:var(--chip);
            display:flex;align-items:center;justify-content:center;font-size:20px}
  .k-opt.sel .k-opt-ic{background:var(--clay);color:#fff}
  .k-actions{display:flex;align-items:center;justify-content:space-between;margin-top:24px}
  .k-hint{color:var(--muted);font-size:13px}
  .k-primary{background:var(--clay);color:var(--gtext);border:0;border-radius:14px;padding:14px 26px;
             font-family:var(--sans);font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 8px 20px -10px rgba(201,96,60,.6)}
  .k-primary:hover{background:var(--clay-d)} .k-primary:disabled{opacity:.5;cursor:default;box-shadow:none}
  .k-ghost{background:var(--card);color:var(--fg);border:1.5px solid var(--line);border-radius:12px;
           padding:11px 18px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer}
  .k-ghost:hover{background:var(--chip)}
  .center{text-align:center}
  /* Two centered divs side by side: title/info on the left, the game/video on the right. */
  .k-split{display:flex;flex-direction:row;align-items:center;justify-content:center;gap:26px;width:100%;flex-wrap:wrap}
  .k-split>.k-left{flex:0 1 300px;min-width:220px;max-width:340px}
  .k-split>.k-right{flex:0 0 auto;display:flex;align-items:center;justify-content:center}
  @media (max-width:600px){ .k-split{gap:22px} .k-split>.k-left{flex:1 1 100%;max-width:none} }
  /* Game canvases/boards: keep their natural size, centered — don't let the column's
     align-items:stretch blow them up to full width. Cap so they always fit. */
  /* Games fill more of the screen: canvases scale UP to the available space (width + max-height,
     height:auto → aspect ratio preserved). Pointer games map coords through the displayed size,
     so this is safe. */
  canvas{align-self:center;width:min(92vw,560px);height:auto;max-height:66vh}
  #grid,#board,#pads,.gameboard,.adwrap{align-self:center;max-width:100%}
  /* DOM-based boards (2048, memory, minesweeper, simon…) scale up crisply; children scale with

  #grid,#board,#pads,.gameboard{zoom:1.22}

  button:hover{background:var(--clay-d)} button:disabled{opacity:.5;cursor:default}
  p{margin:0 0 12px}

  @keyframes kshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}

  @keyframes kpop{0%{transform:scale(1)}35%{transform:scale(1.22)}100%{transform:scale(1)}}
  .k-earn{font-weight:700;color:var(--clay-d);display:inline-block}
  .k-earn.pop,.pop{animation:kpop .35s}
  .k-win{color:var(--green);font-weight:700} .k-lose{color:var(--clay-d);font-weight:700}
  /* Big live score for games — large so you can read it at a glance while playing. */
  .k-bigscore{display:flex;align-items:baseline;gap:12px;margin-top:10px}
  .k-bigscore-n{font-family:var(--display);font-weight:700;font-size:56px;line-height:1;color:var(--fg);font-variant-numeric:tabular-nums}
  .k-bigscore-hi{font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--clay-d)}
  @media (max-height:560px){ .k-bigscore-n{font-size:42px} }
  /* Tighten for short panels so things still fit without scrolling. */
  @media (max-height:560px){ body{padding:18px 22px} .k-title,h1{font-size:24px} .k-grid{margin-top:14px;gap:10px} .k-opt{padding:12px 14px;font-size:18px} .k-opt-ic{width:38px;height:38px} .k-actions{margin-top:16px} }
  @media (max-height:420px){ .k-title,h1{font-size:20px} .k-opt{font-size:16px} }
  /* --- B13 premium game shell: shared vocabulary every game can adopt --------------------- */
  /* Stage: the board/canvas frame — a designed paper card, not a floating void. */
  .k-right{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;
           box-shadow:0 14px 32px -20px rgba(46,43,37,.38),0 2px 10px -6px rgba(46,43,37,.16)}
  @media (max-width:600px){ .k-right{padding:14px;border-radius:16px} }
  /* HUD strip: title / one-line rule / status cluster (score + earn chip) — see gameHead(). */
  .k-hud-rule{height:1px;border:0;background:var(--line);margin:12px 0 2px}
  /* Small pill chip (best-tile, pairs-progress, etc.) */
  .k-chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip);color:var(--clay-d);
          font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:5px 10px;border-radius:999px}
  /* Earn button as a chip (clean, no emoji): a small lock glyph when locked, nothing when claimable. */
  .k-earnbtn::before{content:'\2022';margin-right:7px;font-size:13px;vertical-align:1px;opacity:.55}
  .k-earnbtn:not(:disabled)::before{content:'';margin-right:0}
  .k-earnbtn.k-earn-ready{animation:kglowpulse 900ms ease-out}
  @keyframes kglowpulse{0%{box-shadow:0 0 0 0 rgba(217,119,87,.55)}70%{box-shadow:0 0 0 14px rgba(217,119,87,0)}100%{box-shadow:0 0 0 0 rgba(217,119,87,0)}}
  /* Press-down feedback for interactive controls. */
  .k-press{transition:transform .08s ease}
  .k-press:active{transform:scale(.96)}
  /* Tile spawn / merge (2048 et al). */
  @keyframes ktilepop{0%{transform:scale(.55);opacity:.3}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  .k-tilepop{animation:ktilepop .26s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes kmergepulse{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}
  .k-mergepulse{animation:kmergepulse .22s ease-out}
  /* Refined shake (mismatch / invalid input) — softer than the legacy .shake. */
  @keyframes kshakesoft{0%,100%{transform:translateX(0) rotate(0)}25%{transform:translateX(-3px) rotate(-2deg)}75%{transform:translateX(3px) rotate(2deg)}}
  .k-shake-soft{animation:kshakesoft .4s ease-in-out}
  /* CPU "thinking" pulse. */
  @keyframes kthinkdot{0%,100%{opacity:.3;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
  .k-thinking{animation:kthinkdot 1s ease-in-out infinite}
  /* Win glow-pulse — a tasteful celebration beat, no confetti libs. */
  @keyframes kwinglow{0%{box-shadow:0 0 0 0 rgba(111,154,78,.5)}70%{box-shadow:0 0 0 16px rgba(111,154,78,0)}100%{box-shadow:0 0 0 0 rgba(111,154,78,0)}}
  .k-winglow{animation:kwinglow 1.1s ease-out}
  /* Progress pips — filled/empty round indicators (best-of trackers, pairs matched, etc.). */
  .k-pips{display:flex;gap:7px}
  .k-pip{width:9px;height:9px;border-radius:50%;background:var(--line);transition:background .15s,transform .15s}
  .k-pip.k-pip-win{background:var(--green)}
  .k-pip.k-pip-lose{background:var(--clay)}
  .k-pip.k-pip-draw{background:var(--muted)}
  /* Floating "+delta" score pop. */
  @keyframes kfloatup{0%{opacity:0;transform:translateY(4px) scale(.9)}20%{opacity:1;transform:translateY(-2px) scale(1.05)}100%{opacity:0;transform:translateY(-20px) scale(1)}}
  .k-scoredelta{position:absolute;font-weight:700;color:var(--clay-d);font-size:13px;pointer-events:none;animation:kfloatup .9s ease-out forwards}
  @media (prefers-reduced-motion:reduce){
    .k-earnbtn.k-earn-ready,.k-tilepop,.k-mergepulse,.k-shake-soft,.k-thinking,.k-winglow,.k-scoredelta,.shake,.pop{animation:none!important}
    .k-press:active{transform:none}
  }

  function backHTML(){ return ''; }
  function make(card,faceUp){
    var el=document.createElement('div'); el.className='kcard'+(faceUp?' up':'');
    var p=parse(card);
    el.innerHTML='<div class="kc-inner"><div class="kc-back"></div><div class="kc-front">'+faceHTML(p.r,GLYPH[p.s])+'</div></div>';
    el.dataset.card=p.r+p.s;
    return el;
  }
  function flip(el,up){ if(!el)return; el.classList.toggle('up',up!==false); }
  function deal(el,i){ if(!el)return; el.style.animationDelay=((i||0)*70)+'ms'; el.classList.add('kc-dealing');
    el.addEventListener('animationend',function(){ el.classList.remove('kc-dealing'); el.style.animationDelay=''; },{once:true}); }
  function pop(el){ if(!el)return; el.classList.remove('kc-pop'); void el.offsetWidth; el.classList.add('kc-pop'); }
  return { parse:parse, face:faceHTML, back:backHTML, make:make, flip:flip, deal:deal, pop:pop, glyph:GLYPH };
})();
</script><style>

  </style>
  <div class="wrap"><div class="k-split">
  <div class="k-left"><div class="k-label">Quick Play</div><h1 class="k-title">Euchre</h1><div class="k-sub">Trump-trick battle — first to 10 points vs CPU · earn <span class="reward">Seeds</span></div><hr class="k-hud-rule"><div id="kbigscore" class="k-bigscore" style="display:none"><span id="kbs-now" class="k-bigscore-n">0</span><span id="kbs-hi" class="k-bigscore-hi"></span></div>
  <div id="status" class="k-sub" style="margin-top:8px">Setting up…</div>
  <div id="chips" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
    <span class="k-chip" id="chTrump">Bidding</span>
    <span class="k-chip" id="chTricks">Tricks 0-0</span>
    <span class="k-chip" id="chScore">Game 0-0</span>
  </div>
  </div>
  <div class="k-right"><div class="eu-felt">
    <div class="eu-col"><div class="eu-lbl">Partner (N)</div><div class="eu-hand" id="handN"></div></div>
    <div class="eu-mid">
      <div class="eu-col"><div class="eu-lbl">West</div><div class="eu-hand" id="handW"></div></div>
      <div class="eu-trick" id="trick">
        <div class="eu-center" id="tcenter"></div>
        <div class="eu-play eu-pn" id="playN"></div>
        <div class="eu-play eu-pw" id="playW"></div>
        <div class="eu-play eu-pe" id="playE"></div>
        <div class="eu-play eu-ps" id="playS"></div>
      </div>
      <div class="eu-col"><div class="eu-lbl">East</div><div class="eu-hand" id="handE"></div></div>
    </div>
    <div class="eu-col" style="width:100%"><div class="eu-lbl">You (S)</div><div class="eu-hand" id="handS"></div></div>
    <div class="eu-bid" id="bidpanel"></div>
  </div></div>
  </div>
  <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <button id="reset" class="k-press">New game</button>
    <button id="done" class="k-earnbtn k-press" disabled>Claim Seeds</button>
  </div>
  </div>
  <script>
  (function(){
    var statusEl=document.getElementById('status');
    var doneB=document.getElementById('done');
    var handNodes={0:document.getElementById('handS'),1:document.getElementById('handW'),2:document.getElementById('handN'),3:document.getElementById('handE')};
    var playNodes={0:document.getElementById('playS'),1:document.getElementById('playW'),2:document.getElementById('playN'),3:document.getElementById('playE')};

    var SUITS=['S','H','D','C'], RANKS=['9','10','J','Q','K','A'];
    var GLY={S:'\u2660',H:'\u2665',D:'\u2666',C:'\u2663'};
    var RED={H:1,D:1};
    var NR={'9':1,'10':2,'J':3,'Q':4,'K':5,'A':6};

    // ---- game state ----
    var score=[0,0], dealer=0, claimed=false, finalWon=false, gen=0;
    var hands=[[],[],[],[]], upcard=null, trump=null, maker=-1, aloneFlag=false, aloneSkip=-1;
    var phase='bid1', turn=-1, bidActed=0;
    var trick=[], ledSuit=null, leader=0, tricksWon=[0,0], trickCount=0;

    function sched(fn,ms){ var g=gen; setTimeout(function(){ if(g!==gen)return; fn(); },ms); }
    function status(t){ statusEl.innerHTML=t; }
    function nameOf(p){ return ['You','West','Partner','East'][p]; }
    function partner(p){ return (p+2)%4; }
    function team(p){ return p%2; }
    function gl(s){ return GLY[s]; }
    function glText(s){ return '<span class="'+(RED[s]?'eu-red':'')+'">'+gl(s)+'</span>'; }
    function makerName(){ return team(maker)===0?(maker===0?'You':'Your partner'):nameOf(maker); }

    // ---- trump / card ranking ----
    function leftSuit(t){ return t==='S'?'C':t==='C'?'S':t==='H'?'D':'H'; }
    function isRB(c,t){ return c.r==='J'&&c.s===t; }
    function isLB(c,t){ return c.r==='J'&&c.s===leftSuit(t); }
    function effSuit(c,t){ return isLB(c,t)?t:c.s; }
    function isTrump(c,t){ return effSuit(c,t)===t; }
    function trumpRank(c,t){ if(isRB(c,t))return 7; if(isLB(c,t))return 6; return {'A':5,'K':4,'Q':3,'10':2,'9':1}[c.r]; }
    function strengthAbs(c,t){ return isTrump(c,t)?(100+trumpRank(c,t)):NR[c.r]; }
    function cardVal(c,ledS,t){ if(isTrump(c,t))return 100+trumpRank(c,t); if(effSuit(c,t)===ledS)return NR[c.r]; return 0; }

    // ---- CPU evaluation ----
    function handStrength(h,t){
      var s=0,i;
      for(i=0;i<h.length;i++){ var c=h[i];
        if(isRB(c,t))s+=3.5; else if(isLB(c,t))s+=3;
        else if(isTrump(c,t)){ s+=(c.r==='A'?2:c.r==='K'?1.5:1); }
        else if(c.r==='A')s+=0.6;
      }
      var held={}; for(i=0;i<h.length;i++){ if(!isTrump(h[i],t))held[h[i].s]=1; }
      var off=SUITS.filter(function(x){return x!==t;}), voids=0;
      for(i=0;i<off.length;i++){ if(off[i]!==leftSuit(t)&&!held[off[i]])voids++; }
      return s+voids*0.4;
    }
    function cpuBid1(pl){
      var t=upcard.s, st=handStrength(hands[pl],t);
      if(pl===dealer){ st+=(upcard.r==='J'?1.2:upcard.r==='A'?1:0.6); }
      else if(partner(pl)===dealer){ st+=0.6; }
      else { st-=0.4; }
      return { order: st>=3.4, alone: st>=6, st:st };
    }
    function cpuBid2(pl){
      var best=null;
      for(var i=0;i<SUITS.length;i++){ var t=SUITS[i]; if(t===upcard.s)continue;
        var st=handStrength(hands[pl],t); if(!best||st>best.st)best={suit:t,st:st}; }
      return { call: best.st>=3.7, suit:best.suit, alone: best.st>=6, st:best.st };
    }
    function minBy(a,f){ var b=a[0],bv=f(a[0]); for(var i=1;i<a.length;i++){ var v=f(a[i]); if(v<bv){bv=v;b=a[i];} } return b; }
    function maxBy(a,f){ var b=a[0],bv=f(a[0]); for(var i=1;i<a.length;i++){ var v=f(a[i]); if(v>bv){bv=v;b=a[i];} } return b; }
    function legalCards(h){
      if(trick.length===0)return h.slice();
      var f=h.filter(function(c){ return effSuit(c,trump)===ledSuit; });
      return f.length?f:h.slice();
    }
    function curBest(){
      var bv=-1,bp=-1;
      for(var i=0;i<trick.length;i++){ var v=cardVal(trick[i].c,ledSuit,trump); if(v>bv){bv=v;bp=trick[i].p;} }
      return { val:bv, player:bp };
    }
    function chooseCPUCard(pl){
      var h=hands[pl], legal=legalCards(h), i;
      if(trick.length===0){
        var aces=legal.filter(function(c){ return c.r==='A'&&!isTrump(c,trump); });
        if(aces.length)return maxBy(aces,function(c){return NR[c.r];});
        var plains=legal.filter(function(c){ return !isTrump(c,trump); });
        if(plains.length)return minBy(plains,function(c){return NR[c.r];});
        return maxBy(legal,function(c){return trumpRank(c,trump);});
      }
      var best=curBest(), partnerWin=(team(best.player)===team(pl));
      var winners=legal.filter(function(c){ return cardVal(c,ledSuit,trump)>best.val; });
      if(partnerWin)return minBy(legal,function(c){return strengthAbs(c,trump);});
      if(winners.length)return minBy(winners,function(c){return cardVal(c,ledSuit,trump);});
      return minBy(legal,function(c){return strengthAbs(c,trump);});
    }
    function autoDiscard(pl){
      var h=hands[pl], idx=0, mv=Infinity;
      for(var i=0;i<h.length;i++){ var v=strengthAbs(h[i],trump); if(v<mv){mv=v;idx=i;} }
      h.splice(idx,1);
    }

    // ---- rendering ----
    function renderBacks(pl){
      var el=handNodes[pl]; el.innerHTML='';
      for(var i=0;i<hands[pl].length;i++){ el.appendChild(KCard.make({r:'A',s:'S'},false)); }
    }
    function renderHands(){
      var s=handNodes[0]; s.innerHTML='';
      var legal=(phase==='play'&&turn===0)?legalCards(hands[0]):null;
      for(var i=0;i<hands[0].length;i++){ (function(c){
        var el=KCard.make({r:c.r,s:c.s},true);
        if(trump&&isLB(c,trump)){ el.classList.add('lb'); el.title='Left bower — counts as trump'; }
        var tap=false;
        if(phase==='discard'){ tap=true; }
        else if(phase==='play'&&turn===0){ if(legal.indexOf(c)>=0)tap=true; else el.classList.add('dim'); }
        if(tap){ el.classList.add('tap'); el.addEventListener('click',function(){ onCardTap(c); }); }
        s.appendChild(el);
      })(hands[0][i]); }
      renderBacks(1); renderBacks(2); renderBacks(3);
    }
    function renderTrick(){
      for(var p=0;p<4;p++)playNodes[p].innerHTML='';
      for(var i=0;i<trick.length;i++){ var t=trick[i];
        playNodes[t.p].appendChild(KCard.make({r:t.c.r,s:t.c.s},true)); }
      renderCenter();
    }
    function renderCenter(){
      var c=document.getElementById('tcenter');
      if(phase==='bid1'){
        c.innerHTML='<div class="eu-cnote">Up card</div><div id="upslot"></div>';
        document.getElementById('upslot').appendChild(KCard.make({r:upcard.r,s:upcard.s},true));
      } else if(phase==='bid2'){
        c.innerHTML='<div class="eu-cnote">Turned<br>down</div>';
      } else if(trump){
        c.innerHTML='<div class="eu-cnote">Trump</div><div class="eu-tg'+(RED[trump]?' eu-red':'')+'">'+gl(trump)+'</div>';
      } else { c.innerHTML=''; }
    }
    function updateChips(){
      document.getElementById('chTrump').innerHTML=trump?('Trump '+glText(trump)):'Bidding';
      document.getElementById('chTricks').textContent='Tricks '+tricksWon[0]+'\u2013'+tricksWon[1];
      document.getElementById('chScore').textContent='Game '+score[0]+'\u2013'+score[1];
      if(window.kScore)kScore(score[0]);
    }

    // ---- bidding ----
    function clearBid(){ document.getElementById('bidpanel').innerHTML=''; }
    function showBid1(){
      var b=document.getElementById('bidpanel');
      b.innerHTML='<button id="bOrder" class="k-press">Order up '+glText(upcard.s)+'</button>'+
        '<button id="bPass" class="k-press eu-ghost">Pass</button>'+
        '<label class="eu-alone"><input type="checkbox" id="bAlone"> Go alone</label>';
      document.getElementById('bOrder').addEventListener('click',function(){ var a=document.getElementById('bAlone').checked; clearBid(); makeR1(0,a); });
      document.getElementById('bPass').addEventListener('click',function(){ clearBid(); bidPass(); });
    }
    function showBid2(){
      var b=document.getElementById('bidpanel'), html='';
      for(var i=0;i<SUITS.length;i++){ if(SUITS[i]===upcard.s)continue;
        html+='<button class="k-press bcall" data-s="'+SUITS[i]+'">Call '+glText(SUITS[i])+'</button>'; }
      html+='<button id="bPass2" class="k-press eu-ghost">Pass</button>'+
        '<label class="eu-alone"><input type="checkbox" id="bAlone2"> Go alone</label>';
      b.innerHTML=html;
      var btns=b.querySelectorAll('.bcall');
      for(var j=0;j<btns.length;j++){ (function(el){ el.addEventListener('click',function(){
        var a=document.getElementById('bAlone2').checked; clearBid(); makeR2(0,el.getAttribute('data-s'),a);
      }); })(btns[j]); }
      document.getElementById('bPass2').addEventListener('click',function(){ clearBid(); bidPass(); });
    }
    function bidTurn(){
      updateChips();
      if(phase==='bid1'){
        if(turn===0){ status('Order up '+glText(upcard.s)+' or pass?'); showBid1(); return; }
        status(nameOf(turn)+' is bidding\u2026');
        sched(function(){ var d=cpuBid1(turn); if(d.order){ makeR1(turn,d.alone); } else { bidPass(); } },700);
      } else {
        if(turn===0){ status('Name a new trump suit, or pass.'); showBid2(); return; }
        status(nameOf(turn)+' is bidding\u2026');
        sched(function(){ var d=cpuBid2(turn); if(d.call){ makeR2(turn,d.suit,d.alone); } else { bidPass(); } },700);
      }
    }
    function bidPass(){ bidActed++; advanceBid(); }
    function advanceBid(){
      if(phase==='bid1'){
        if(bidActed>=4){ phase='bid2'; bidActed=0; turn=(dealer+1)%4; renderCenter(); status('All passed \u2014 name a new trump.'); bidTurn(); return; }
        turn=(turn+1)%4; bidTurn();
      } else {
        if(bidActed>=4){ status('All passed \u2014 redeal.'); dealer=(dealer+1)%4; sched(startHand,900); return; }
        turn=(turn+1)%4; bidTurn();
      }
    }
    function makeR1(pl,alone){
      trump=upcard.s; maker=pl; aloneFlag=alone;
      hands[dealer].push({r:upcard.r,s:upcard.s});
      clearBid(); updateChips();
      status(nameOf(pl)+' ordered up '+glText(trump)+(alone?' — alone!':'.'));
      if(dealer===0){ phase='discard'; renderCenter(); renderHands(); status('You take the up card — tap a card to discard.'); }
      else { autoDiscard(dealer); sched(beginPlay,600); }
    }
    function makeR2(pl,suit,alone){
      trump=suit; maker=pl; aloneFlag=alone;
      clearBid(); updateChips();
      status(nameOf(pl)+' called '+glText(trump)+(alone?' — alone!':'.'));
      sched(beginPlay,600);
    }
    function onCardTap(c){
      if(phase==='discard'){ doDiscard(c); return; }
      if(phase==='play'&&turn===0){ playCard(0,c); }
    }
    function doDiscard(c){
      var h=hands[0]; for(var i=0;i<h.length;i++){ if(h[i]===c){ h.splice(i,1); break; } }
      status('Discarded. Play begins.');
      beginPlay();
    }

    // ---- play ----
    function activeN(){ return aloneSkip>=0?3:4; }
    function firstActive(p){ while(p===aloneSkip)p=(p+1)%4; return p; }
    function nextActive(p){ do{ p=(p+1)%4; }while(p===aloneSkip); return p; }
    function beginPlay(){
      aloneSkip=aloneFlag?partner(maker):-1;
      phase='play'; tricksWon=[0,0]; trickCount=0; trick=[]; ledSuit=null;
      leader=firstActive((dealer+1)%4); turn=leader;
      updateChips(); renderCenter(); renderTrick(); renderHands();
      status(makerName()+' make(s) trump '+glText(trump)+(aloneFlag?' — going alone!':'. Play a card.'));
      playStep();
    }
    function playStep(){
      renderHands();
      if(trick.length>=activeN()){ sched(resolveTrick,750); return; }
      if(turn===0){ status('Your turn — tap a card to play.'); return; }
      status(nameOf(turn)+' is thinking\u2026');
      sched(function(){ if(phase!=='play')return; playCard(turn,chooseCPUCard(turn)); },700);
    }
    function playCard(pl,c){
      var h=hands[pl], idx=-1;
      for(var i=0;i<h.length;i++){ if(h[i]===c||(h[i].r===c.r&&h[i].s===c.s)){ idx=i; break; } }
      if(idx<0)return;
      var card=h.splice(idx,1)[0];
      if(trick.length===0)ledSuit=effSuit(card,trump);
      trick.push({p:pl,c:card});
      renderTrick(); renderHands();
      if(trick.length>=activeN()){ turn=-1; sched(resolveTrick,850); }
      else { turn=nextActive(turn); playStep(); }
    }
    function resolveTrick(){
      var b=curBest();
      tricksWon[team(b.player)]++;
      updateChips();
      status(nameOf(b.player)+' wins the trick.');
      trickCount++;
      sched(function(){
        trick=[]; ledSuit=null; renderTrick();
        if(trickCount>=5){ scoreHand(); }
        else { leader=b.player; turn=firstActive(b.player); playStep(); }
      },950);
    }
    function scoreHand(){
      var mt=team(maker), mtr=tricksWon[mt], pts, tm, made;
      if(mtr>=3){ made=true; tm=mt; pts=(mtr===5)?(aloneFlag?4:2):1; }
      else { made=false; tm=1-mt; pts=2; }
      score[tm]+=pts; updateChips();
      var msg;
      if(made){
        var march=(mtr===5)?(aloneFlag?'a lone march! ':'a march! '):'';
        msg=(mt===0?'Your team':'Opponents')+' made it — '+march+'+'+pts+' pts.';
      } else {
        msg=((1-mt)===0?'Euchre! Your team':'Euchred — opponents')+' set the makers, +'+pts+' pts.';
      }
      status(msg);
      if(score[0]>=10||score[1]>=10){ sched(endGame,950); }
      else { dealer=(dealer+1)%4; sched(startHand,1600); }
    }
    function endGame(){
      phase='gameover'; finalWon=score[0]>=10;
      status(finalWon
        ? ('You win the game '+score[0]+'\u2013'+score[1]+'! Claim your Seeds.')
        : ('CPU wins '+score[1]+'\u2013'+score[0]+'. Claim your Seeds for playing.'));
      doneB.disabled=false; doneB.classList.add('k-earn-ready');
      if(window.kScore)kScore(score[0]);
    }

    // ---- hand / game setup ----
    function startHand(){
      var deck=[],i,j;
      for(i=0;i<SUITS.length;i++)for(j=0;j<RANKS.length;j++)deck.push({r:RANKS[j],s:SUITS[i]});
      for(var k=deck.length-1;k>0;k--){ var m=Math.floor(Math.random()*(k+1)); var t=deck[k]; deck[k]=deck[m]; deck[m]=t; }
      hands=[[],[],[],[]];
      for(i=0;i<4;i++)for(j=0;j<5;j++)hands[i].push(deck.pop());
      upcard=deck.pop();
      trump=null; maker=-1; aloneFlag=false; aloneSkip=-1;
      trick=[]; ledSuit=null; tricksWon=[0,0]; trickCount=0;
      phase='bid1'; bidActed=0; turn=(dealer+1)%4;
      clearBid(); updateChips(); renderCenter(); renderTrick(); renderHands();
      status('Dealer: '+nameOf(dealer)+'. '+(turn===0?('Order up '+glText(upcard.s)+' or pass?'):(nameOf(turn)+' bids first\u2026')));
      bidTurn();
    }
    function init(){
      gen++;
      score=[0,0]; claimed=false; finalWon=false;
      dealer=Math.floor(Math.random()*4);
      doneB.disabled=true; doneB.classList.remove('k-earn-ready');
      startHand();
    }

    document.getElementById('reset').addEventListener('click',init);
    doneB.addEventListener('click',function(){
      if(claimed)return; claimed=true; doneB.disabled=true; doneB.classList.remove('k-earn-ready');
      kiwiComplete(25, score[0], finalWon);
    });

    init();
  })();
  </script>
</div></body></html>
